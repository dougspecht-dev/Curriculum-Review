<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Westminster Curriculum Intelligence Tool</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-offset-2:#edeae5;
  --color-surface-dynamic:#e6e4df;--color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-text-inverse:#f9f8f4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;
  --color-primary-highlight:#cedcd8;
  --color-accent:#7a39bb;--color-accent-hover:#5f2699;
  --color-warning:#964219;--color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-blue:#006494;--color-orange:#da7101;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Satoshi',system-ui,sans-serif;
  --font-display:'Cabinet Grotesk','Satoshi',system-ui,sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
}
[data-theme="dark"]{
  --color-bg:#0f0e0c;--color-surface:#161513;--color-surface-2:#1c1b19;
  --color-surface-offset:#1a1917;--color-surface-offset-2:#201f1d;
  --color-surface-dynamic:#2d2c2a;--color-divider:#252422;--color-border:#333230;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#4a4947;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
  --color-primary-highlight:#1e3335;
  --color-accent:#a86fdf;--color-accent-hover:#9250d0;
  --color-warning:#bb653b;--color-success:#6daa45;--color-success-highlight:#2a3a25;
  --color-blue:#5591c7;--color-orange:#fdab43;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.3);--shadow-md:0 4px 12px oklch(0 0 0/0.4);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;scroll-padding-top:5rem;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6;}
img,svg{display:block;max-width:100%;}
button,input,select{font:inherit;color:inherit;}
button{cursor:pointer;background:none;border:none;}
a,button,[role="button"]{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition),opacity var(--transition);}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}

/* === LAYOUT === */
.app-shell{display:grid;grid-template-rows:auto 1fr;min-height:100dvh;}
.top-bar{position:sticky;top:0;z-index:100;background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:0 clamp(1rem,3vw,2rem);}
.top-bar-inner{display:flex;align-items:center;gap:1rem;height:3.5rem;max-width:1400px;margin:0 auto;}
.logo-area{display:flex;align-items:center;gap:0.625rem;text-decoration:none;color:var(--color-text);}
.logo-mark{flex-shrink:0;}
.logo-title{font-family:var(--font-display);font-size:var(--text-sm);font-weight:800;letter-spacing:-0.01em;line-height:1.2;}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:400;}
.top-bar-spacer{flex:1;}
.theme-toggle{display:flex;align-items:center;justify-content:center;width:2.25rem;height:2.25rem;border-radius:var(--radius-md);color:var(--color-text-muted);}
.theme-toggle:hover{background:var(--color-surface-offset);color:var(--color-text);}

.main-layout{display:grid;grid-template-columns:280px 1fr;max-width:1400px;margin:0 auto;width:100%;padding:0 clamp(0.5rem,2vw,1.5rem);}
.sidebar{position:sticky;top:3.5rem;height:calc(100dvh - 3.5rem);overflow-y:auto;padding:1.5rem 1rem 1.5rem 0;border-right:1px solid var(--color-border);}
.main-content{padding:1.5rem 0 4rem 1.5rem;min-width:0;}

/* === SIDEBAR === */
.sidebar-section-title{font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-faint);margin-bottom:0.5rem;padding:0 0.5rem;}
.sidebar-section{margin-bottom:1.5rem;}
.nav-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.625rem;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text-muted);text-decoration:none;width:100%;}
.nav-item:hover{background:var(--color-surface-offset);color:var(--color-text);}
.nav-item.active{background:var(--color-primary-highlight);color:var(--color-primary);}
.nav-item svg{flex-shrink:0;opacity:0.7;}
.nav-item.active svg{opacity:1;}

/* === YEAR SELECTOR === */
.year-selector-section{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1.5rem;}
.year-selector-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);margin-bottom:0.75rem;}
.year-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.375rem;}
.year-btn{padding:0.5rem 0.25rem;border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);border:1px solid transparent;text-align:center;}
.year-btn:hover{background:var(--color-surface-offset);color:var(--color-text);}
.year-btn.selected{background:var(--color-primary);color:#fff;border-color:var(--color-primary);}
.year-btn.reform-year{position:relative;}
.year-btn.reform-year::after{content:'★';position:absolute;top:-4px;right:-2px;font-size:8px;color:var(--color-orange);}

/* === CONTENT === */
.page-header{margin-bottom:2rem;}
.page-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;line-height:1.1;letter-spacing:-0.02em;margin-bottom:0.5rem;}
.page-subtitle{color:var(--color-text-muted);font-size:var(--text-sm);max-width:60ch;}
.year-badge{display:inline-flex;align-items:center;gap:0.375rem;background:var(--color-primary-highlight);color:var(--color-primary);font-size:var(--text-xs);font-weight:600;padding:0.25rem 0.625rem;border-radius:var(--radius-full);margin-bottom:0.75rem;}

/* === COURSE CARDS === */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;margin-bottom:2rem;}
.course-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow var(--transition),border-color var(--transition),transform 150ms ease;}
.course-card:hover{box-shadow:var(--shadow-md);border-color:var(--color-primary);transform:translateY(-1px);}
.course-card.active{border-color:var(--color-primary);box-shadow:0 0 0 2px var(--color-primary-highlight),var(--shadow-md);}
.course-card-header{padding:1rem;border-bottom:1px solid var(--color-divider);}
.course-tag{display:inline-flex;align-items:center;gap:0.25rem;font-size:var(--text-xs);font-weight:600;padding:0.2rem 0.5rem;border-radius:var(--radius-full);margin-bottom:0.5rem;}
.tag-animation{background:#1a2e35;color:#4f98a3;}
.tag-digital{background:#1a1e35;color:#5591c7;}
.tag-film{background:#2e1a1a;color:#dd6974;}
.tag-graphic{background:#2a1a35;color:#a86fdf;}
.tag-games{background:#1a2e1a;color:#6daa45;}
.tag-illustration{background:#2e2a1a;color:#fdab43;}
.tag-television{background:#2e1a1a;color:#dd6974;}
.tag-journalism{background:#1a1e35;color:#5591c7;}
.tag-pr{background:#2a1a35;color:#a86fdf;}
.tag-animation{background:#1a2e35;color:#4f98a3;}
[data-theme="light"] .tag-animation{background:#e8f4f5;color:#01696f;}
[data-theme="light"] .tag-digital{background:#e5e8f5;color:#006494;}
[data-theme="light"] .tag-film{background:#f5e5e5;color:#a12c7b;}
[data-theme="light"] .tag-graphic{background:#f0e5f5;color:#7a39bb;}
[data-theme="light"] .tag-games{background:#e5f5e5;color:#437a22;}
[data-theme="light"] .tag-illustration{background:#f5f0e5;color:#964219;}
[data-theme="light"] .tag-television{background:#f5e5e5;color:#a13544;}
[data-theme="light"] .tag-journalism{background:#e5e8f5;color:#006494;}
[data-theme="light"] .tag-pr{background:#f0e5f5;color:#7a39bb;}
.course-name{font-family:var(--font-display);font-size:var(--text-sm);font-weight:800;line-height:1.2;letter-spacing:-0.01em;}
.course-meta{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:0.25rem;}
.course-card-body{padding:0.875rem 1rem;}
.intake-alert{font-size:var(--text-xs);color:var(--color-text-muted);}
.intake-alert strong{color:var(--color-primary);font-weight:600;}

/* === DETAIL PANEL === */
.detail-panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden;margin-top:1.5rem;}
.detail-header{padding:1.5rem 1.5rem 1rem;background:var(--color-surface-offset);border-bottom:1px solid var(--color-divider);}
.detail-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.75rem;}
.detail-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
.detail-close{display:flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:var(--radius-md);color:var(--color-text-muted);flex-shrink:0;}
.detail-close:hover{background:var(--color-surface-dynamic);color:var(--color-text);}
.detail-year-context{display:flex;align-items:center;gap:0.5rem;font-size:var(--text-xs);color:var(--color-text-muted);}

/* === TABS === */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--color-divider);padding:0 1.5rem;background:var(--color-surface);}
.tab-btn{padding:0.875rem 1rem;font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn:hover{color:var(--color-text);}
.tab-btn.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:600;}
.tab-content{padding:1.5rem;display:none;}
.tab-content.active{display:block;}

/* === SCHOOL KNOWLEDGE SECTION === */
.knowledge-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.knowledge-card{background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem;}
.knowledge-card-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.375rem;}
.kc-primary{color:var(--color-primary);}
.kc-warning{color:var(--color-warning);}
.kc-success{color:var(--color-success);}
.kc-blue{color:var(--color-blue);}
.kc-accent{color:var(--color-accent);}
.kc-orange{color:var(--color-orange);}
.knowledge-list{list-style:none;display:flex;flex-direction:column;gap:0.375rem;}
.knowledge-list li{font-size:var(--text-xs);color:var(--color-text-muted);padding-left:1rem;position:relative;line-height:1.5;}
.knowledge-list li::before{content:'';position:absolute;left:0;top:0.45em;width:0.4rem;height:0.4rem;border-radius:50%;}
.kl-know li::before{background:var(--color-success);}
.kl-partial li::before{background:var(--color-orange);}
.kl-unknown li::before{background:var(--color-warning);opacity:0.7;}
.kl-new li::before{background:var(--color-primary);}

/* === LEVEL SECTIONS === */
.level-section{margin-bottom:1.5rem;}
.level-header{display:flex;align-items:center;gap:0.625rem;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--color-divider);}
.level-badge{font-family:var(--font-display);font-size:var(--text-sm);font-weight:800;padding:0.25rem 0.625rem;border-radius:var(--radius-full);}
.lb-4{background:var(--color-primary-highlight);color:var(--color-primary);}
.lb-5{background:color-mix(in oklch,var(--color-accent) 15%,transparent);color:var(--color-accent);}
.lb-6{background:color-mix(in oklch,var(--color-orange) 15%,transparent);color:var(--color-orange);}
.level-desc{font-size:var(--text-xs);color:var(--color-text-muted);}
.level-year-note{margin-left:auto;font-size:var(--text-xs);color:var(--color-text-faint);background:var(--color-surface-dynamic);padding:0.2rem 0.5rem;border-radius:var(--radius-full);}

.module-group{margin-bottom:1rem;}
.module-group-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);margin-bottom:0.5rem;}
.module-chips{display:flex;flex-wrap:wrap;gap:0.375rem;}
.module-chip{font-size:var(--text-xs);padding:0.2rem 0.5rem;border-radius:var(--radius-full);border:1px solid var(--color-border);color:var(--color-text-muted);background:var(--color-surface-offset);}
.module-chip.core{background:var(--color-primary-highlight);color:var(--color-primary);border-color:transparent;}
.module-chip.flagged{background:color-mix(in oklch,var(--color-orange) 15%,transparent);color:var(--color-orange);border-color:transparent;}

/* === CURRICULUM ADVICE === */
.advice-section{margin-bottom:1.25rem;}
.advice-title{font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.375rem;}
.advice-text{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.65;max-width:72ch;}
.advice-box{background:var(--color-surface-offset);border-left:3px solid var(--color-primary);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:0.875rem 1rem;margin-top:0.625rem;font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.65;}
.advice-box.warning{border-left-color:var(--color-warning);}
.advice-box.success{border-left-color:var(--color-success);}
.advice-box.accent{border-left-color:var(--color-accent);}
.advice-box strong{color:var(--color-text);font-weight:600;}

/* === TIMELINE SECTION === */
.timeline{position:relative;padding-left:1.5rem;}
.timeline::before{content:'';position:absolute;left:0.3125rem;top:0;bottom:0;width:2px;background:var(--color-border);}
.timeline-item{position:relative;margin-bottom:1.25rem;}
.timeline-dot{position:absolute;left:-1.5rem;top:0.3125rem;width:0.625rem;height:0.625rem;border-radius:50%;background:var(--color-border);border:2px solid var(--color-bg);}
.timeline-dot.active{background:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-highlight);}
.timeline-dot.future{background:var(--color-accent);}
.timeline-year{font-size:var(--text-xs);font-weight:700;color:var(--color-text-faint);margin-bottom:0.25rem;}
.timeline-content{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.6;}
.timeline-content strong{color:var(--color-text);}

/* === REFORM INDICATOR === */
.reform-banner{background:color-mix(in oklch,var(--color-primary) 10%,transparent);border:1px solid var(--color-primary);border-radius:var(--radius-lg);padding:0.875rem 1rem;display:flex;align-items:flex-start;gap:0.625rem;margin-bottom:1.5rem;font-size:var(--text-sm);}
.reform-banner svg{flex-shrink:0;margin-top:0.125rem;color:var(--color-primary);}
.reform-banner-text{color:var(--color-text-muted);line-height:1.6;}
.reform-banner-text strong{color:var(--color-primary);}
.reform-banner.orange{background:color-mix(in oklch,var(--color-orange) 10%,transparent);border-color:var(--color-orange);}
.reform-banner.orange svg,.reform-banner.orange strong{color:var(--color-orange);}
.reform-banner.green{background:var(--color-success-highlight);border-color:var(--color-success);}
.reform-banner.green svg,.reform-banner.green strong{color:var(--color-success);}

/* === OVERVIEW DASHBOARD === */
.overview-intro{margin-bottom:2rem;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem;margin-bottom:1.5rem;}
.stat-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem;}
.stat-value{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;line-height:1;letter-spacing:-0.02em;color:var(--color-primary);}
.stat-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:0.25rem;}
.curriculum-timeline{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;}
.section-title{font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}

/* === WHAT'S CHANGING === */
.change-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.change-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem;}
.change-year-label{font-size:var(--text-xs);font-weight:700;padding:0.2rem 0.5rem;border-radius:var(--radius-full);margin-bottom:0.625rem;display:inline-block;}
.cy-current{background:var(--color-surface-dynamic);color:var(--color-text-muted);}
.cy-2028{background:var(--color-primary-highlight);color:var(--color-primary);}
.cy-2029{background:color-mix(in oklch,var(--color-accent) 15%,transparent);color:var(--color-accent);}
.cy-2030{background:color-mix(in oklch,var(--color-orange) 15%,transparent);color:var(--color-orange);}
.change-card-title{font-size:var(--text-xs);font-weight:700;margin-bottom:0.5rem;}
.change-list{list-style:none;display:flex;flex-direction:column;gap:0.25rem;}
.change-list li{font-size:var(--text-xs);color:var(--color-text-muted);padding-left:1rem;position:relative;}
.change-list li::before{content:'→';position:absolute;left:0;color:var(--color-primary);font-size:0.65rem;top:0.15em;}

/* === HOW TO USE === */
.how-to-box{background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;}
.step-list{list-style:none;display:flex;flex-direction:column;gap:0.625rem;counter-reset:steps;}
.step-item{display:flex;gap:0.75rem;font-size:var(--text-sm);counter-increment:steps;}
.step-num{flex-shrink:0;width:1.5rem;height:1.5rem;border-radius:var(--radius-full);background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);font-weight:700;margin-top:0.125rem;}
.step-text{color:var(--color-text-muted);line-height:1.6;}

/* === EMPTY STATE === */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--color-text-muted);}
.empty-state svg{margin:0 auto 1rem;opacity:0.3;}
.empty-state h3{color:var(--color-text);font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;margin-bottom:0.375rem;}
.empty-state p{font-size:var(--text-xs);max-width:36ch;margin:0 auto;}

/* === PRINT / EXPORT === */
.export-bar{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.5rem;background:var(--color-surface-offset);border-top:1px solid var(--color-divider);}
.btn{display:inline-flex;align-items:center;gap:0.375rem;padding:0.5rem 0.875rem;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;cursor:pointer;transition:background var(--transition),color var(--transition);}
.btn-primary{background:var(--color-primary);color:#fff;}
.btn-primary:hover{background:var(--color-primary-hover);}
.btn-ghost{background:transparent;color:var(--color-text-muted);border:1px solid var(--color-border);}
.btn-ghost:hover{background:var(--color-surface-offset);color:var(--color-text);}
.export-note{font-size:var(--text-xs);color:var(--color-text-faint);margin-left:auto;}

/* === RESPONSIVE === */
@media(max-width:1024px){
  .main-layout{grid-template-columns:240px 1fr;}
}
@media(max-width:768px){
  .main-layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--color-border);padding:1rem 0;}
  .main-content{padding:1rem 0 3rem;}
  .knowledge-grid{grid-template-columns:1fr;}
  .change-grid{grid-template-columns:1fr;}

// Cohort profiles: what a student entering that year has been taught
function getCohortProfile(year) {
  if (year <= 2027) return 'pre-reform';
  if (year === 2028) return 'transition-1'; // first year new NC taught
  if (year === 2029) return 'transition-2'; // new GCSE specifications start
  if (year >= 2030 && year <= 2031) return 'reform-early'; // new A levels start 2030
  return 'reform-full';
}

function init() {
  renderYearGrid();
  showView('overview');
}


function renderYearGrid() {
  const grid = document.getElementById('yearGrid');
  grid.innerHTML = YEARS.map(y => `
    <button class="year-btn ${y === selectedYear ? 'selected' : ''} ${REFORM_YEARS.includes(y) ? 'reform-year' : ''}"
      data-action="year" data-year="${y}">${y}</button>
  `).join('');
}

function selectYear(y) {
  selectedYear = y;
  renderYearGrid();
  refreshCurrentView();
}

function refreshCurrentView() {
  showView(currentView);
  if (selectedCourseId) showCourseDetail(selectedCourseId);
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
}

function showView(view) {
  currentView = view;
  setActiveNav(view);
  const main = document.getElementById('mainContent');
  if (view === 'overview') {
    main.innerHTML = renderOverview();
  } else if (view === 'courses') {
    main.innerHTML = renderCoursesView();
  } else if (view === 'reforms') {
    main.innerHTML = renderReformsView();
  }
    if (selectedCourseId && view === 'courses') {
    showCourseDetail(selectedCourseId);
  }
}

function quickJump(id) {
  showView('courses');
  setTimeout(() => showCourseDetail(id), 50);
}

function renderReformsView() {

</div>

<div class="advice-box" style="margin-bottom:1.5rem;">
  <strong>Source basis:</strong> This timeline is built from the UK Government's Curriculum and Assessment Review (launched 2024, interim report March 2025, final report autumn 2025), the accompanying expert panel recommendations, responses from subject associations (BFI, British Animation Awards, Ukie, ACE), and analysis of how proposed specification changes by AQA, OCR and Pearson Edexcel will affect what students know before arriving at university. ★ Years marked with a star in the year selector are key reform years.
</div>

<div class="timeline">
  ${reforms.map(r => `
    <div class="timeline-item">
      <div class="timeline-dot ${r.type === 'current' ? 'active' : r.type === 'reform' || r.type === 'future' ? 'future' : ''}"></div>

</div>

<div style="margin-top:2rem;">
  <div class="section-title">Subject-Specific Reform Implications</div>
  
  <div class="advice-section">
    <div class="advice-title">Media Studies (GCSE & A Level)</div>
    <div class="advice-box"><strong>Current (pre-2029):</strong> AQA/OCR specifications teach media language, representation, audience, industry with set media products. NEA practical element. A Level adds theoretical frameworks (feminist theory, postcolonial theory, Marxist media theory). Uptake low compared to core subjects due to EBacc pressure.<br><br><strong>From 2029:</strong> Reformed GCSE specifications expected to include stronger digital media production, platform media analysis, and AI/synthetic media units. Greater practical portfolio emphasis. A Level from 2030 likely includes a dedicated digital ethics and AI content unit. Uptake expected to significantly increase with EBacc abolition.</div>
  </div>

  <div class="advice-section">
    <div class="advice-title">Computing (GCSE & A Level)</div>
    <div class="advice-box"><strong>Current (pre-2029):</strong> Focus on programming (Python), algorithms, data structures, Boolean logic, computer architecture. Very limited creative application or data literacy. No AI component. OCR, AQA, Pearson Edexcel all follow similar narrow structure.<br><br><strong>From 2029:</strong> New Computing GCSE expected to include: AI and machine learning principles, data literacy (collecting, cleaning, analysing data), digital ethics, cybersecurity in depth, and creative/applied computing projects. Programming remains but as one component among broader digital competencies. This is the single most significant change for Media & Communication courses — students will arrive with genuine AI conceptual literacy for the first time.</div>
  </div>

  <div class="advice-section">
    <div class="advice-title">Art & Design (GCSE & A Level)</div>
    <div class="advice-box"><strong>Current (pre-2028):</strong> Strong creative process framework (AO1-4: contextual, creative, record, present). Optional specialisms including Graphic Design, Photography, Textile, Fine Art. Uptake significantly reduced by EBacc — many schools dropped Art & Design as a GCSE option. A Level Art has strong NEA personal investigation.<br><br><strong>From 2028 onwards:</strong> Creative Arts Entitlement — all students guaranteed meaningful arts education at secondary level. EBacc abolition from 2028 means schools reintroduce arts options. New Primary Arts framework strengthens creative foundations from Year 1. From 2029: new/revised GCSE Art & Design specs with potentially stronger digital art and design components. Expect meaningfully higher proportion of students with formal art qualifications from 2030 cohort onwards.</div>
  </div>

  <div class="advice-section">
    <div class="advice-title">Games Design (New GCSE/A Level in development)</div>

`;

function showCourseDetail(id) {
  selectedCourseId = id;
  // Mark cards
  document.querySelectorAll('.course-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  
  const course = courses.find(c => c.id === id);
  if (!course) return;
  
  const container = document.getElementById('courseDetailContainer');
  if (!container) return;
  
  container.innerHTML = renderCourseDetail(course);
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    activeTab = 'school';
  switchTab('school');
}

      <div>

function switchTab(tab) {
  activeTab = tab;
  ['school','modules','advice'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    const content = document.getElementById('tc-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
    if (content) content.classList.toggle('active', t === tab);
  });
  }

function closeCourseDetail() {
  selectedCourseId = null;
  document.querySelectorAll('.course-card').forEach(c => c.classList.remove('active'));
  const container = document.getElementById('courseDetailContainer');
  if (container) container.innerHTML = '';
}

function printCourse(id) {
  window.print();
}




// ============================================================
// EVENT DELEGATION — handles all clicks via data-action attributes
// ============================================================
document.addEventListener('click', function(e) {
  var el = e.target;
  // Walk up the DOM to find an element with data-action
  while (el && el !== document.body) {
    var action = el.getAttribute('data-action');
    if (action) {
      e.preventDefault();
      switch(action) {
        case 'overview':
          showView('overview'); break;
        case 'courses':
          showView('courses'); break;
        case 'reforms':
          showView('reforms'); break;
        case 'jump':
          quickJump(el.getAttribute('data-id')); break;
        case 'year':
          selectYear(parseInt(el.getAttribute('data-year'), 10)); break;
        case 'course':
          showCourseDetail(el.getAttribute('data-id')); break;
        case 'close-course':
          closeCourseDetail(); break;
        case 'tab':
          switchTab(el.getAttribute('data-tab')); break;
        case 'print':
          window.print(); break;
      }
      return;
    }
    el = el.parentElement;
  }
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', function() {
  var r = document.documentElement;
  var current = r.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  r.setAttribute('data-theme', next);
  this.innerHTML = next === 'dark'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
});

// Initialize
(function() {
  try {
    init();
  } catch(err) {
    console.error('Init failed:', err);
    document.getElementById('mainContent').innerHTML =
      '<div style="padding:2rem;font-family:sans-serif;color:#dd6974">' +
      '<strong>Error loading tool:</strong> ' + err.message + '</div>';
  }
})();

</script>
